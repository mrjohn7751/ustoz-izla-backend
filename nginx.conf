server {
    listen 80;
    server_name ustoz-izla.uz;

    client_max_body_size 100M;

    # ===== API → Laravel =====
    location /api {
        root /var/www/ustoz-izla/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/ustoz-izla/public/index.php;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
    }

    # ===== Sanctum/Auth routes → Laravel =====
    location /sanctum {
        root /var/www/ustoz-izla/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/ustoz-izla/public/index.php;
            include fastcgi_params;
        }
    }

    # ===== Storage (rasmlar, videolar) → Laravel =====
    location /storage {
        alias /var/www/ustoz-izla/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== Qolgan hamma narsa → Next.js (Website) =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static fayllar
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Maxfiy fayllarni bloklash
    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/ustoz-izla-access.log;
    error_log /var/log/nginx/ustoz-izla-error.log;
}
